name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com

jobs:
  # ─── Detect which services changed ───────────────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      frontend:          ${{ steps.filter.outputs.frontend }}
      gateway:           ${{ steps.filter.outputs.gateway }}
      user_service:      ${{ steps.filter.outputs.user_service }}
      job_service:       ${{ steps.filter.outputs.job_service }}
      interview_service: ${{ steps.filter.outputs.interview_service }}
      cv_service:        ${{ steps.filter.outputs.cv_service }}
      roadmap_service:   ${{ steps.filter.outputs.roadmap_service }}
      crawler_worker:    ${{ steps.filter.outputs.crawler_worker }}
      kafka_consumers:   ${{ steps.filter.outputs.kafka_consumers }}
      shared:            ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
            gateway:
              - 'apps/services/gateway/**'
            user_service:
              - 'apps/services/user_service/**'
            job_service:
              - 'apps/services/job_service/**'
            interview_service:
              - 'apps/services/interview_service/**'
            cv_service:
              - 'apps/services/cv_service/**'
            roadmap_service:
              - 'apps/services/roadmap_service/**'
            crawler_worker:
              - 'apps/services/crawler_worker/**'
            kafka_consumers:
              - 'apps/services/kafka_consumers/**'
            shared:
              - 'packages/**'

  # ─── Lint & type-check shared packages ───────────────────────────────────────
  lint-shared:
    name: Lint shared packages
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check packages/
      - run: mypy packages/ --ignore-missing-imports

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  ci-frontend:
    name: CI — frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Lint
        working-directory: apps/frontend
        run: npm run lint

      - name: Type check
        working-directory: apps/frontend
        run: npm run type-check

      - name: Run tests
        working-directory: apps/frontend
        run: npm run test -- --passWithNoTests

      - name: Build
        working-directory: apps/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api

      - name: Docker build (verify only, no push on CI)
        run: |
          docker build \
            -f apps/frontend/Dockerfile \
            -t vonders/frontend:${{ github.sha }} \
            apps/frontend

  # ─── FastAPI service CI template (reusable via matrix) ───────────────────────
  ci-fastapi:
    name: CI — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
            path: apps/services/gateway
          - service: user_service
            changed: ${{ needs.detect-changes.outputs.user_service }}
            path: apps/services/user_service
          - service: job_service
            changed: ${{ needs.detect-changes.outputs.job_service }}
            path: apps/services/job_service
          - service: interview_service
            changed: ${{ needs.detect-changes.outputs.interview_service }}
            path: apps/services/interview_service
          - service: cv_service
            changed: ${{ needs.detect-changes.outputs.cv_service }}
            path: apps/services/cv_service
          - service: roadmap_service
            changed: ${{ needs.detect-changes.outputs.roadmap_service }}
            path: apps/services/roadmap_service
          - service: crawler_worker
            changed: ${{ needs.detect-changes.outputs.crawler_worker }}
            path: apps/services/crawler_worker
          - service: kafka_consumers
            changed: ${{ needs.detect-changes.outputs.kafka_consumers }}
            path: apps/services/kafka_consumers

    # Skip if this specific service didn't change (unless shared packages changed)
    if: matrix.changed == 'true' || needs.detect-changes.outputs.shared == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.path }}/requirements.txt

      - name: Install shared packages
        run: pip install -e packages/shared_models -e packages/logger -e packages/kafka_client

      - name: Install service dependencies
        run: pip install -r ${{ matrix.path }}/requirements.txt

      - name: Lint (ruff)
        run: ruff check ${{ matrix.path }}/

      - name: Type check (mypy)
        run: mypy ${{ matrix.path }}/ --ignore-missing-imports

      - name: Run tests
        run: |
          pytest ${{ matrix.path }}/tests/ \
            --cov=${{ matrix.path }} \
            --cov-report=xml \
            --cov-fail-under=60 \
            -v
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: ${{ matrix.service }}
          fail_ci_if_error: false

      - name: Docker build (verify only)
        run: |
          docker build \
            -f ${{ matrix.path }}/Dockerfile \
            -t vonders/${{ matrix.service }}:${{ github.sha }} \
            --build-arg SERVICE_PATH=${{ matrix.path }} \
            .

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

  # ─── Final gate — all checks must pass ───────────────────────────────────────
  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [lint-shared, ci-frontend, ci-fastapi]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"