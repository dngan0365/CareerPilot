name: CD — Staging

on:
  push:
    branches: [staging]

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com
  EKS_CLUSTER: vonders-staging
  K8S_NAMESPACE: staging

jobs:
  # ─── Detect changed services ──────────────────────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      frontend:          ${{ steps.filter.outputs.frontend }}
      gateway:           ${{ steps.filter.outputs.gateway }}
      user_service:      ${{ steps.filter.outputs.user_service }}
      job_service:       ${{ steps.filter.outputs.job_service }}
      interview_service: ${{ steps.filter.outputs.interview_service }}
      cv_service:        ${{ steps.filter.outputs.cv_service }}
      roadmap_service:   ${{ steps.filter.outputs.roadmap_service }}
      crawler_worker:    ${{ steps.filter.outputs.crawler_worker }}
      kafka_consumers:   ${{ steps.filter.outputs.kafka_consumers }}
      shared:            ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
            gateway:
              - 'apps/services/gateway/**'
            user_service:
              - 'apps/services/user_service/**'
            job_service:
              - 'apps/services/job_service/**'
            interview_service:
              - 'apps/services/interview_service/**'
            cv_service:
              - 'apps/services/cv_service/**'
            roadmap_service:
              - 'apps/services/roadmap_service/**'
            crawler_worker:
              - 'apps/services/crawler_worker/**'
            kafka_consumers:
              - 'apps/services/kafka_consumers/**'
            shared:
              - 'packages/**'

  # ─── Configure AWS + EKS once, reused by all deploy jobs ─────────────────────
  setup:
    name: Configure AWS & EKS
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

  # ─── Build + push + deploy matrix ────────────────────────────────────────────
  deploy:
    name: Deploy — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, setup]
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            changed: ${{ needs.detect-changes.outputs.frontend }}
            path: apps/frontend
            port: 3000
          - service: gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
            path: apps/services/gateway
            port: 8000
          - service: user-service
            changed: ${{ needs.detect-changes.outputs.user_service }}
            path: apps/services/user_service
            port: 8000
          - service: job-service
            changed: ${{ needs.detect-changes.outputs.job_service }}
            path: apps/services/job_service
            port: 8000
          - service: interview-service
            changed: ${{ needs.detect-changes.outputs.interview_service }}
            path: apps/services/interview_service
            port: 8000
          - service: cv-service
            changed: ${{ needs.detect-changes.outputs.cv_service }}
            path: apps/services/cv_service
            port: 8000
          - service: roadmap-service
            changed: ${{ needs.detect-changes.outputs.roadmap_service }}
            path: apps/services/roadmap_service
            port: 8000
          - service: crawler-worker
            changed: ${{ needs.detect-changes.outputs.crawler_worker }}
            path: apps/services/crawler_worker
            port: 8000
          - service: kafka-consumers
            changed: ${{ needs.detect-changes.outputs.kafka_consumers }}
            path: apps/services/kafka_consumers
            port: 8000

    if: matrix.changed == 'true' || needs.detect-changes.outputs.shared == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "tag=staging-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image=${{ env.ECR_REGISTRY }}/vonders-${{ matrix.service }}:staging-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build & push Docker image
        run: |
          docker build \
            -f ${{ matrix.path }}/Dockerfile \
            -t ${{ steps.tag.outputs.image }} \
            -t ${{ env.ECR_REGISTRY }}/vonders-${{ matrix.service }}:staging-latest \
            --build-arg ENVIRONMENT=staging \
            --cache-from ${{ env.ECR_REGISTRY }}/vonders-${{ matrix.service }}:staging-latest \
            .
          docker push ${{ steps.tag.outputs.image }}
          docker push ${{ env.ECR_REGISTRY }}/vonders-${{ matrix.service }}:staging-latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Deploy to EKS (rolling update)
        run: |
          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}=${{ steps.tag.outputs.image }} \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/${{ matrix.service }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=300s

      - name: Smoke test — health check
        run: |
          # Wait for pod to be ready then hit /health
          kubectl wait pod \
            -l app=${{ matrix.service }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --for=condition=Ready \
            --timeout=120s

          POD=$(kubectl get pod \
            -l app=${{ matrix.service }} \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.items[0].metadata.name}')

          kubectl exec $POD -n ${{ env.K8S_NAMESPACE }} -- \
            wget -qO- http://localhost:${{ matrix.port }}/health || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back ${{ matrix.service }}"
          kubectl rollout undo deployment/${{ matrix.service }} \
            -n ${{ env.K8S_NAMESPACE }}

  # ─── Notify result ────────────────────────────────────────────────────────────
  notify:
    name: Notify staging result
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ needs.deploy.result == 'success' && '✅' || '❌' }} *Staging deploy ${{ needs.deploy.result }}*\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}