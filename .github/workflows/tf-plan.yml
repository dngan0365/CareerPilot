name: Terraform Plan

on:
  pull_request:
    branches: [main, staging]
    paths:
      - 'infra/terraform/**'

env:
  AWS_REGION: ap-southeast-1
  TF_WORKING_DIR: infra/terraform

jobs:
  # ─── Detect which environment this PR targets ─────────────────────────────────
  tf-plan:
    name: Terraform plan — ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [staging, prod]
        # Only plan prod if merging to main; staging if merging to staging
        exclude:
          - env: prod
            # Exclude prod plan when targeting staging branch
    permissions:
      contents: read
      pull-requests: write  # needed to post plan as PR comment

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: true  # enables plan output capture

      - name: Terraform init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.env }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform format check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/${{ matrix.env }}.tfvars" \
            -no-color \
            -detailed-exitcode \
            2>&1 | tee /tmp/tfplan-${{ matrix.env }}.txt
        continue-on-error: true  # exit code 2 means changes, not failure

      - name: Check for errors
        run: |
          EXIT_CODE=${{ steps.plan.outcome == 'failure' && '1' || '0' }}
          if [ "$EXIT_CODE" == "1" ]; then
            echo "Terraform plan returned an error"
            exit 1
          fi

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/tfplan-${{ matrix.env }}.txt', 'utf8');

            const maxLength = 65000;
            const truncated = plan.length > maxLength
              ? plan.substring(0, maxLength) + '\n\n... (truncated)'
              : plan;

            const fmtStatus   = '${{ steps.fmt.outcome }}' === 'success' ? '✅' : '❌';
            const initStatus  = '${{ steps.init.outcome }}' === 'success' ? '✅' : '❌';
            const valStatus   = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const planOutcome = '${{ steps.plan.outcome }}';
            const planStatus  = planOutcome === 'failure' ? '❌' : '✅';

            const body = `## 🏗️ Terraform Plan — \`${{ matrix.env }}\`

            | Step | Status |
            |------|--------|
            | Format check | ${fmtStatus} |
            | Init         | ${initStatus} |
            | Validate     | ${valStatus} |
            | Plan         | ${planStatus} |

            <details>
            <summary>📋 Show plan output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            > Triggered by @${{ github.actor }} on commit \`${{ github.sha }}\`
            `;

            // Find existing comment to update rather than creating a new one each time
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(`Terraform Plan — \`${{ matrix.env }}\``)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─── Security scan on Terraform files ────────────────────────────────────────
  tf-security:
    name: Terraform security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1
        with:
          working_directory: infra/terraform
          soft_fail: true  # warn but don't block for personal project

      - name: Run checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform
          framework: terraform
          soft_fail: true
          output_format: github_failed_only