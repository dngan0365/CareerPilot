apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # All FastAPI services (they expose /metrics via prometheus-fastapi-instrumentator)
      - job_name: 'user-service'
        static_configs:
          - targets: ['user-service.default.svc.cluster.local:80']
        metrics_path: /metrics

      - job_name: 'cv-service'
        static_configs:
          - targets: ['cv-service.default.svc.cluster.local:80']
        metrics_path: /metrics

      - job_name: 'job-service'
        static_configs:
          - targets: ['job-service.default.svc.cluster.local:80']
        metrics_path: /metrics

      - job_name: 'interview-service'
        static_configs:
          - targets: ['interview-service.default.svc.cluster.local:80']
        metrics_path: /metrics

      - job_name: 'roadmap-service'
        static_configs:
          - targets: ['roadmap-service.default.svc.cluster.local:80']
        metrics_path: /metrics

      - job_name: 'gateway'
        static_configs:
          - targets: ['gateway.default.svc.cluster.local:80']
        metrics_path: /metrics

      # Kafka exporter
      - job_name: 'kafka'
        static_configs:
          - targets: ['kafka-exporter.monitoring.svc.cluster.local:9308']

      # Kubernetes node metrics
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090